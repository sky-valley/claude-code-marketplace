<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Observatory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:ital,wght@1,400;1,500&display=swap" rel="stylesheet" />
    <style>
:root {
  /* Tokens mirror the hackathon landing page (hackathon/tailwind.config.ts). */
  --ink: #1a1a1a;
  --muted: #737368;
  --paper: #fafaf7;            /* cream */
  --paper-soft: #efece4;       /* codebg */
  --accent: #b9521e;           /* terracotta accent */
  --accent-hover: #9a4317;
  --accent-soft: #f4e7dd;
  --signal: #a02f15;           /* DECLINE — deeper red so it pops against the ambient orange */
  --signal-soft: rgba(160, 47, 21, 0.12);
  --success: #2f7a4a;          /* ACCEPT / COMPLETE — desaturated forest, plays nicely with terracotta */
  --success-soft: rgba(47, 122, 74, 0.12);
  --line: #e8e4d8;             /* divider */
  --line-strong: rgba(26, 26, 26, 0.28);
  --shadow: 0 24px 80px rgba(26, 26, 26, 0.08);
  --sans: "Inter", ui-sans-serif, system-ui, sans-serif;
  --display: "Inter Tight", "Inter", ui-sans-serif, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  --serif: "Crimson Pro", ui-serif, Georgia, serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
body { font-family: var(--sans); }
button { font: inherit; color: inherit; }
::selection { background: var(--accent-soft); }

/* ── Connect screen ────────────────────────────── */
.connect-shell {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
}
.connect-card {
  width: 100%;
  max-width: 38rem;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(14px);
  box-shadow: var(--shadow);
  padding: 2.5rem;
}
.connect-card h1 {
  margin: 0 0 0.25rem;
  font-family: var(--display);
  font-size: 2.2rem;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.04em;
}
.connect-card .eyebrow {
  margin: 0 0 1.8rem;
  font-family: var(--mono);
  font-size: 0.77rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}
.connect-field { margin-bottom: 1rem; }
.connect-field label {
  display: block;
  margin-bottom: 0.3rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.connect-field input,
.connect-field textarea {
  width: 100%;
  padding: 0.6rem 0.7rem;
  font-family: var(--mono);
  font-size: 0.82rem;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.6);
  color: var(--ink);
  outline: none;
  transition: border-color 120ms ease;
}
.connect-field input:focus,
.connect-field textarea:focus { border-color: var(--accent); }
.connect-field textarea { min-height: 6rem; resize: vertical; }
.connect-error {
  margin: 0 0 1rem;
  padding: 0.6rem 0.8rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--signal);
  background: var(--signal-soft);
  border: 1px solid var(--signal);
  display: none;
}
.connect-btn {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
  font-family: var(--mono);
  font-size: 0.82rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 100ms ease;
}
.connect-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.connect-hint {
  margin: 1rem 0 0;
  font-size: 0.78rem;
  line-height: 1.5;
  color: var(--muted);
}

/* ── Observatory shell ─────────────────────────── */
.shell {
  min-height: 100vh;
  padding: 2rem;
  display: grid;
  gap: 0;
}

.hero-plane,
.workspace {
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(14px);
  box-shadow: var(--shadow);
}

.hero-plane {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  min-height: min(36rem, calc(100vh - 4rem));
  overflow: hidden;
}

.hero-copy {
  padding: 3rem 3rem 2.75rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 1.5rem;
}

.eyebrow {
  margin: 0 0 0.5rem;
  font-family: var(--mono);
  font-size: 0.77rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.hero-copy h1,
.room-header h2 {
  margin: 0;
  font-family: var(--display);
  font-weight: 500;
  font-size: clamp(2.6rem, 4.6vw, 5rem);
  line-height: 1.02;
  letter-spacing: -0.04em;
  max-width: 12ch;
}

.lede {
  margin: 0;
  max-width: 32rem;
  font-size: 1.08rem;
  line-height: 1.7;
  color: var(--ink);
}

.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  text-transform: uppercase;
}

.hero-meta span,
.room-badges span {
  padding: 0.55rem 0.7rem;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.55);
}

.hero-graph {
  position: relative;
  border-left: 1px solid var(--line);
  background:
    linear-gradient(rgba(17, 18, 23, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(17, 18, 23, 0.05) 1px, transparent 1px);
  background-size: 3rem 3rem;
  overflow: hidden;
  cursor: grab;
}
.hero-graph.is-panning { cursor: grabbing; }

.graph-surface {
  position: absolute;
  inset: 0;
  transform-origin: 0 0;
}

.graph-controls {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 1px;
  z-index: 10;
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(17, 18, 23, 0.08);
}
.graph-controls button {
  width: 2rem;
  height: 2rem;
  border: none;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(6px);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  color: var(--ink);
  display: grid;
  place-items: center;
  transition: background 100ms ease;
}
.graph-controls button:hover { background: rgba(255, 255, 255, 1); }
.graph-controls button + button { border-top: 1px solid var(--line); }

.graph-lines {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.metro-line {
  stroke: var(--line-strong);
  stroke-width: 0.35;
  stroke-linecap: round;
}
.metro-line-interior { stroke: var(--accent); stroke-opacity: 0.55; stroke-width: 0.35; }
.metro-line-nested { stroke: var(--ink); stroke-opacity: 0.35; stroke-width: 0.3; stroke-dasharray: 0.8 0.6; }

.station {
  position: absolute;
  transform: translate(-5px, -50%);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0;
  border: none;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 180ms ease;
}
.station:hover { transform: translate(-5px, -50%) scale(1.06); }
.station.is-selected { transform: translate(-5px, -50%) scale(1.06); }
.station-root { transform: translate(-8px, -50%); }
.station-root:hover,
.station-root.is-selected { transform: translate(-8px, -50%) scale(1.06); }

.station-dot {
  flex-shrink: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--dot-color, var(--ink));
  border: 2px solid rgba(255, 255, 255, 0.9);
  box-shadow: 0 0 0 1px var(--dot-color, var(--ink));
  transition: transform 180ms ease, box-shadow 180ms ease;
}
.station-dot-hub {
  width: 16px;
  height: 16px;
  border-width: 3px;
}
.station.is-selected .station-dot,
.station:hover .station-dot {
  transform: scale(1.35);
  box-shadow: 0 0 0 2px var(--dot-color, var(--ink)), 0 0 12px rgba(185, 82, 30, 0.28);
}

.station-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink);
  padding: 0.2rem 0.45rem;
  background: rgba(242, 238, 230, 0.92);
  border: 1px solid var(--line);
  pointer-events: none;
  opacity: 0;
  transform: translateX(4px);
  transition: opacity 140ms ease, transform 140ms ease;
}
.station:hover .station-label,
.station.is-selected .station-label {
  opacity: 1;
  transform: translateX(0);
}

.station.is-fresh { animation: station-arrive 420ms ease; }

/* ── Browser chrome ─────────────────────────────── */
.browser {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  min-height: 30rem;
  margin-top: -4.75rem;
  position: relative;
  z-index: 2;
  border: 1px solid var(--line);
  border-top: 0;
  background: rgba(255, 252, 247, 0.92);
  border-radius: 0 0 6px 6px;
  overflow: hidden;
}

.browser-nav {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0.5rem 0.85rem;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.6);
  font-family: var(--mono);
  font-size: 0.78rem;
  min-height: 2.4rem;
}

.crumb {
  position: relative;
  display: flex;
  align-items: center;
  gap: 0.35rem;
}
.crumb-type {
  padding: 0.12rem 0.4rem;
  font-size: 0.62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-radius: 2px;
  background: rgba(17, 18, 23, 0.06);
  color: var(--muted);
}
.crumb:first-child .crumb-type { background: var(--accent-soft); color: var(--accent); }
.crumb-name {
  border: none;
  background: none;
  font: inherit;
  padding: 0.2rem 0.3rem;
  cursor: pointer;
  color: var(--muted);
  border-radius: 3px;
  transition: background 100ms ease, color 100ms ease;
}
.crumb-name:hover { background: rgba(17, 18, 23, 0.06); color: var(--ink); }
.crumb-current .crumb-name { color: var(--ink); font-weight: 600; }

.crumb-sep {
  margin: 0 0.25rem;
  color: rgba(17, 18, 23, 0.22);
  font-size: 0.85rem;
}

.nav-meta {
  margin-left: auto;
  color: var(--muted);
  font-size: 0.66rem;
  text-transform: uppercase;
  white-space: nowrap;
}

.browser-viewport {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 22rem;
  min-height: 0;
}

.browser-page {
  overflow: auto;
  padding: 0.8rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
}
.page-subtitle {
  margin: 0 0 0.4rem;
  padding: 0 0.2rem;
  font-size: 0.92rem;
  color: var(--muted);
}
.page-empty {
  padding: 2rem;
  text-align: center;
  color: var(--muted);
}

.event-row {
  border: 1px solid transparent;
  border-left: 3px solid var(--line);
  background: transparent;
  padding: 0.8rem 0.9rem;
  display: grid;
  gap: 0.22rem;
  cursor: pointer;
  text-align: left;
  animation: event-fade 280ms ease;
}
.event-row:hover,
.event-row.is-selected {
  border-color: var(--line);
  border-left-color: var(--signal);
  background: rgba(255, 255, 255, 0.7);
}

.event-row.has-children {
  border-left-color: var(--accent);
}
.event-row.has-children:hover {
  border-left-color: var(--accent);
  background: var(--accent-soft);
}
/* Outcome-tinted left bar: orange = in flight, green = accepted, red = declined. */
.event-row.has-replies { border-left-color: var(--accent); }
.event-row.has-replies:hover { background: var(--accent-soft); }
.event-row.has-replies.has-accept { border-left-color: var(--success); }
.event-row.has-replies.has-accept:hover { background: var(--success-soft); }
.event-row.has-replies.has-decline { border-left-color: var(--signal); }
.event-row.has-replies.has-decline:hover { background: var(--signal-soft); }
.event-row.has-replies.is-expanded { background: rgba(255, 255, 255, 0.55); }
.reply-toggle {
  display: inline-block;
  margin-left: 0.4rem;
  color: var(--accent);
  font-size: 0.85em;
  transform: translateY(-1px);
}
.event-row.has-replies.has-accept .reply-toggle { color: var(--success); }
.event-row.has-replies.has-decline .reply-toggle { color: var(--signal); }

.meta-status {
  display: inline-block;
  padding: 0 0.35rem;
  margin-left: 0.1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  border-radius: 2px;
  border: 1px solid currentColor;
}
.meta-status.is-promise { color: var(--accent); }
.meta-status.is-accept { color: var(--success); }
.meta-status.is-decline { color: var(--signal); }
.drill-arrow {
  font-weight: 700;
  color: var(--accent);
  margin-left: 0.3rem;
}

.event-kind,
.event-meta,
.inspector-meta {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.event-kind { color: var(--signal); }
.event-label { font-size: 0.98rem; line-height: 1.5; }
.event-meta, .inspector-meta { color: var(--muted); }

/* Inline replies nested under an INTENT row */
.event-replies {
  display: flex;
  flex-direction: column;
  gap: 0.32rem;
  margin: 0.15rem 0 0.35rem 1.4rem;
  padding-left: 0.9rem;
  border-left: 2px dashed var(--line);
}
.event-replies-empty {
  margin: 0.15rem 0 0.35rem 1.4rem;
  padding: 0.4rem 0.9rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  border-left: 2px dashed var(--line);
}
.event-reply {
  border: 1px solid transparent;
  border-left: 3px solid var(--line);
  background: transparent;
  padding: 0.55rem 0.8rem;
  display: grid;
  gap: 0.18rem;
  cursor: pointer;
  text-align: left;
  animation: event-fade 280ms ease;
}
.event-reply:hover,
.event-reply.is-selected {
  border-color: var(--line);
  border-left-color: var(--accent);
  background: rgba(255, 255, 255, 0.7);
}
.event-reply.has-children {
  border-left-color: var(--accent);
}
.event-reply.has-children:hover {
  background: var(--accent-soft);
}
.event-reply.is-decline {
  border-left-color: var(--signal);
  background: var(--signal-soft);
}
.event-reply.is-decline:hover,
.event-reply.is-decline.is-selected {
  border-left-color: var(--signal);
  background: rgba(160, 47, 21, 0.18);
}
.event-reply .event-label { font-size: 0.88rem; }

.browser-inspector {
  border-left: 1px solid var(--line);
  padding: 1.2rem;
  background: rgba(17, 18, 23, 0.94);
  color: #f7f4ee;
  min-width: 0;
  overflow: auto;
}
.browser-inspector h3 {
  margin: 0 0 0.45rem;
  font-family: var(--display);
  font-weight: 500;
  font-size: 1.2rem;
  line-height: 1.15;
  letter-spacing: -0.02em;
  overflow-wrap: anywhere;
}
.browser-inspector pre {
  margin: 0.8rem 0 0;
  padding: 0.8rem;
  border: 1px solid rgba(247, 244, 238, 0.12);
  background: rgba(255, 255, 255, 0.04);
  overflow: auto;
  font-family: var(--mono);
  font-size: 0.74rem;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}

.loading-shell {
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-size: 1.2rem;
}

@keyframes station-arrive {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
  60% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

@keyframes event-fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 1100px) {
  .hero-plane { grid-template-columns: 1fr; min-height: auto; }
  .hero-graph { min-height: 26rem; border-left: 0; border-top: 1px solid var(--line); }
  .browser { margin-top: 0.85rem; }
  .browser-viewport { grid-template-columns: 1fr; }
  .browser-inspector { border-left: 0; border-top: 1px solid var(--line); max-height: 18rem; }
}

@media (max-width: 720px) {
  .shell { padding: 1rem; gap: 1rem; }
  .hero-copy { padding: 1.2rem; }
  .hero-copy h1 { max-width: none; }
  .hero-meta { gap: 0.4rem; }
  .browser-inspector { padding: 1rem; }
}

    <div id="app"></div>
    <script type="module">
import { hierarchy, tree } from 'https://cdn.jsdelivr.net/npm/d3-hierarchy@3/+esm';

const app = document.getElementById('app');

// ── Observe client ───────────────────────────────────────────────────────────
// Uses the token-only GET /observe endpoint — no DPoP, no ITP framing.

let connection = null; // { origin, spaceId, stationToken }

async function scanSpace(spaceId, since = 0) {
  const observeUrl = `${connection.origin}/spaces/${connection.spaceId}/observe`
    + `?token=${encodeURIComponent(connection.stationToken)}`
    + `&space=${encodeURIComponent(spaceId)}`
    + `&since=${since}`
    + `&_t=${Date.now()}`;
  const response = await fetch(observeUrl);
  if (!response.ok) {
    const text = await response.text();
    throw new Error(`Observe failed (${response.status}): ${text}`);
  }
  return response.json();
}

async function scanRecursive(spaceId, maxDepth = 3) {
  const allMessages = new Map();
  const interiorMessages = new Map();

  async function descend(parentId, depth) {
    const result = await scanSpace(parentId);
    const messages = result.messages;
    allMessages.set(parentId, messages);
    if (depth >= maxDepth) return;

    const intents = messages.filter((m) => m.type === 'INTENT' && m.intentId);
    const scanPromises = intents.map(async (intent) => {
      try {
        const interior = await scanSpace(intent.intentId);
        if (interior.messages.length > 0) {
          interiorMessages.set(intent.intentId, interior.messages);
          await descend(intent.intentId, depth + 1);
        }
      } catch (err) {
        console.warn('Failed to scan interior', intent.intentId, err.message);
      }
    });
    await Promise.all(scanPromises);
  }

  await descend(spaceId, 0);
  return { topLevel: allMessages.get(spaceId) ?? [], interiors: interiorMessages };
}

// ── Data model ───────────────────────────────────────────────────────────────

const participantNames = new Map();

function friendlyName(senderId) {
  if (participantNames.has(senderId)) return participantNames.get(senderId);
  if (senderId.length > 16) return senderId.slice(-8);
  return senderId;
}

function learnParticipants(messages) {
  for (const m of messages) {
    if (m.payload?.handle && typeof m.payload.handle === 'string') {
      participantNames.set(m.senderId, m.payload.handle);
    }
    if (m.payload?.intended_agent_label && typeof m.payload.intended_agent_label === 'string') {
      const label = m.payload.intended_agent_label;
      if (!participantNames.has(m.senderId) && label.length < 40) {
        participantNames.set(m.senderId, label);
      }
    }
    if (m.payload?.content && typeof m.payload.content === 'string') {
      const match = m.payload.content.match(/for\s+([a-z0-9_-]+)/i);
      if (match && match[1].length < 30) {
        const target = match[1];
        if (!participantNames.has(target)) {
          participantNames.set(target, target);
        }
      }
    }
  }
}

function eventKindFor(msg) {
  const map = {
    INTENT: 'intent_posted', PROMISE: 'promise_posted', ACCEPT: 'accept_posted',
    COMPLETE: 'complete_posted', ASSESS: 'assess_posted', DECLINE: 'decline_posted',
  };
  return map[msg.type] ?? 'message_posted';
}

function eventLabelFor(msg) {
  if (msg.type === 'PROMISE') return String(msg.payload?.content ?? 'Promise posted');
  if (msg.type === 'ACCEPT') return `${friendlyName(msg.senderId)} accepts`;
  if (msg.type === 'COMPLETE') return `${friendlyName(msg.senderId)} completes`;
  if (msg.type === 'ASSESS') return `${friendlyName(msg.senderId)} assesses`;
  if (msg.type === 'DECLINE') return String(msg.payload?.reason ?? 'Declined');
  if (msg.type === 'INTENT') return String(msg.payload?.content ?? 'Intent posted');
  return String(msg.payload?.content ?? `${msg.type.toLowerCase()} posted`);
}

function toEvents(parentId, messages) {
  return messages.map((msg) => ({
    id: `${parentId}:${msg.seq}`,
    roomId: parentId,
    kind: eventKindFor(msg),
    label: eventLabelFor(msg),
    actorId: friendlyName(msg.senderId),
    timestamp: msg.timestamp,
    seq: msg.seq,
    raw: msg,
  }));
}

function buildSnapshot(spaceId, topLevel, interiors) {
  learnParticipants(topLevel);
  for (const msgs of interiors.values()) learnParticipants(msgs);

  const nodes = [];
  const edges = [];
  const eventsByNode = {};
  const interiorEvents = {};

  const topEvents = toEvents(spaceId, topLevel);
  eventsByNode[spaceId] = topEvents;
  const participants = [...new Set(topLevel.map((m) => m.senderId))];
  nodes.push({
    id: spaceId,
    type: 'root',
    title: spaceId.length > 20 ? spaceId.slice(0, 8) + '...' + spaceId.slice(-6) : spaceId,
    subtitle: 'Top-level space',
    visibility: 'bound',
    participants: participants.map(friendlyName),
    updatedAt: topEvents.at(-1)?.timestamp ?? 0,
    eventCount: topEvents.length,
    preview: topEvents.at(-1)?.label ?? 'No activity',
  });

  const intents = topLevel.filter((m) => m.type === 'INTENT' && m.intentId);
  for (const intent of intents) {
    const id = intent.intentId;
    edges.push({ from: spaceId, to: id, kind: 'contains' });
    const interior = interiors.get(id) ?? [];
    const intEvents = toEvents(id, interior);
    eventsByNode[id] = intEvents;

    const label = intent.payload?.content
      ? String(intent.payload.content).slice(0, 60)
      : `Intent ${id.slice(-8)}`;
    const intParticipants = [...new Set(interior.map((m) => m.senderId))];
    nodes.push({
      id,
      type: 'intent_interior',
      title: label,
      subtitle: `Thread from ${friendlyName(intent.senderId)}`,
      visibility: 'interior',
      participants: intParticipants.map(friendlyName),
      updatedAt: intEvents.at(-1)?.timestamp ?? intent.timestamp,
      eventCount: intEvents.length,
      preview: intEvents.at(-1)?.label ?? 'No responses yet',
    });

    for (const innerMsg of interior) {
      if (innerMsg.type === 'INTENT' && innerMsg.intentId && interiors.has(innerMsg.intentId)) {
        const nestedId = innerMsg.intentId;
        edges.push({ from: id, to: nestedId, kind: 'contains' });
        const nestedMsgs = interiors.get(nestedId);
        const nestedEvents = toEvents(nestedId, nestedMsgs);
        interiorEvents[nestedId] = nestedEvents;
        eventsByNode[nestedId] = nestedEvents;
        nodes.push({
          id: nestedId,
          type: 'nested_interior',
          title: `Thread ${nestedId.slice(-8)}`,
          subtitle: `Nested thread`,
          visibility: 'interior',
          participants: [...new Set(nestedMsgs.map((m) => m.senderId))].map(friendlyName),
          updatedAt: nestedEvents.at(-1)?.timestamp ?? 0,
          eventCount: nestedEvents.length,
          preview: nestedEvents.at(-1)?.label ?? '',
        });
      }
    }

    // Interior events for drill-down from top-level intents
    if (interior.length > 0) {
      interiorEvents[id] = intEvents;
    }
  }

  // Catch-all: ensure every known interior (any depth scanRecursive reached)
  // has entries in eventsByNode and interiorEvents. The explicit loop above
  // only covered depth-1 and depth-2 intents; without this pass, depth-3+
  // INTENT rows would render with a misleading "Waiting for steward response"
  // even when their replies are present.
  for (const [intentId, msgs] of interiors) {
    if (eventsByNode[intentId]) continue;
    const evts = toEvents(intentId, msgs);
    eventsByNode[intentId] = evts;
    if (msgs.length > 0) interiorEvents[intentId] = evts;
  }

  nodes.sort((a, b) => {
    if (a.type === 'root') return -1;
    if (b.type === 'root') return 1;
    return b.updatedAt - a.updatedAt;
  });

  return {
    generatedAt: Date.now(),
    origin: connection.origin,
    spaceId,
    nodes,
    edges,
    eventsByNode,
    interiorEvents,
  };
}

// ── Rendering ────────────────────────────────────────────────────────────────

let snapshot = null;
let selectedNodeId = null;
let selectedEventId = null;
let knownNodeIds = new Set();
let renderedFingerprint = null;
let renderedNodeId = null;
let renderedEventId = null;
let renderedBrowseDepth = 0;
let isFirstRender = true;
let browseStack = [];
let expandedIntents = new Set();

let graphScale = 1;
let graphPanX = 0;
let graphPanY = 0;
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 4;
const ZOOM_STEP = 0.15;

function esc(value) {
  return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
}

function timeAgo(ts) {
  if (!ts) return 'quiet';
  const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (s < 5) return 'live now';
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 48) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function nodeColor(node) {
  if (node.type === 'root') return 'var(--ink)';
  if (node.type === 'intent_interior') return 'var(--accent)';
  return 'var(--muted)';
}

function metroLayout(nodes, edges) {
  const coords = new Map();
  const root = nodes.find((n) => n.type === 'root');
  if (!root) return coords;

  const childrenOf = new Map();
  const hasParent = new Set();
  for (const edge of edges) {
    if (!childrenOf.has(edge.from)) childrenOf.set(edge.from, []);
    childrenOf.get(edge.from).push(edge.to);
    hasParent.add(edge.to);
  }
  for (const n of nodes) {
    if (n.id !== root.id && !hasParent.has(n.id)) {
      if (!childrenOf.has(root.id)) childrenOf.set(root.id, []);
      childrenOf.get(root.id).push(n.id);
    }
  }

  const nodeById = new Map(nodes.map((n) => [n.id, n]));
  function buildNode(id) {
    const kids = (childrenOf.get(id) || []).filter((cid) => nodeById.has(cid)).map((cid) => buildNode(cid));
    return { id, children: kids.length > 0 ? kids : undefined };
  }

  const rootH = hierarchy(buildNode(root.id));
  const nodeCount = rootH.descendants().length;
  const radius = Math.min(40, 20 + nodeCount * 3);
  const treeLayout = tree()
    .size([2 * Math.PI, radius])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2) / (a.depth || 1));
  treeLayout(rootH);

  const angleOffset = -Math.PI / 4;
  rootH.each((d) => {
    if (d.depth === 0) {
      coords.set(d.data.id, { x: 50, y: 50 });
    } else {
      const angle = d.x + angleOffset;
      coords.set(d.data.id, {
        x: Math.max(8, Math.min(92, 50 + Math.cos(angle) * d.y)),
        y: Math.max(8, Math.min(92, 50 + Math.sin(angle) * d.y)),
      });
    }
  });
  return coords;
}

function buildGraphMarkup(nodes) {
  const edges = snapshot.edges || [];
  const coords = metroLayout(nodes, edges);
  const nodeById = new Map(nodes.map((n) => [n.id, n]));

  let lineMarkup = '';
  for (const edge of edges) {
    const from = coords.get(edge.from);
    const to = coords.get(edge.to);
    if (!from || !to) continue;
    const child = nodeById.get(edge.to);
    const cls = child?.type === 'intent_interior' ? 'metro-line metro-line-interior' : 'metro-line metro-line-nested';
    lineMarkup += `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" class="${cls}" />`;
  }

  const nodeMarkup = nodes.map((node) => {
    const point = coords.get(node.id) || { x: 50, y: 50 };
    const isSelected = node.id === selectedNodeId;
    const isFresh = !knownNodeIds.has(node.id);
    const isRoot = node.type === 'root';
    const cls = ['station', isRoot ? 'station-root' : '', isSelected ? 'is-selected' : '', isFresh ? 'is-fresh' : ''].filter(Boolean).join(' ');
    const shortLabel = node.title.length > 24 ? node.title.slice(0, 22) + '...' : node.title;
    return `
      <button class="${cls}" data-node-id="${esc(node.id)}" style="left:${point.x}%;top:${point.y}%">
        <span class="station-dot${isRoot ? ' station-dot-hub' : ''}" style="--dot-color:${nodeColor(node)}"></span>
        <span class="station-label">${esc(shortLabel)}</span>
      </button>`;
  }).join('');

  return `
    <div class="graph-surface">
      <svg viewBox="0 0 100 100" class="graph-lines" preserveAspectRatio="none">${lineMarkup}</svg>
      ${nodeMarkup}
    </div>`;
}

function applyGraphTransform() {
  const surface = document.querySelector('.graph-surface');
  if (surface) surface.style.transform = `translate(${graphPanX}px, ${graphPanY}px) scale(${graphScale})`;
}

let graphPanZoomBound = false;

function bindGraphPanZoom() {
  const container = document.querySelector('.hero-graph');
  if (!container) return;
  applyGraphTransform();
  if (graphPanZoomBound) return;
  graphPanZoomBound = true;

  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const old = graphScale;
    graphScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, graphScale + (e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP)));
    const ratio = graphScale / old;
    graphPanX = cx - ratio * (cx - graphPanX);
    graphPanY = cy - ratio * (cy - graphPanY);
    applyGraphTransform();
  }, { passive: false });

  let dragging = false, dx = 0, dy = 0, px = 0, py = 0;
  container.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.station') || e.target.closest('.graph-controls')) return;
    dragging = true; dx = e.clientX; dy = e.clientY; px = graphPanX; py = graphPanY;
    container.classList.add('is-panning');
    container.setPointerCapture(e.pointerId);
  });
  container.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    graphPanX = px + (e.clientX - dx);
    graphPanY = py + (e.clientY - dy);
    applyGraphTransform();
  });
  const endDrag = () => { dragging = false; container.classList.remove('is-panning'); };
  container.addEventListener('pointerup', endDrag);
  container.addEventListener('pointercancel', endDrag);

  container.addEventListener('click', (e) => {
    const btn = e.target.closest('.graph-controls button');
    if (!btn) return;
    const rect = container.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const old = graphScale;
    if (btn.classList.contains('graph-zoom-in')) graphScale = Math.min(ZOOM_MAX, graphScale + ZOOM_STEP);
    else if (btn.classList.contains('graph-zoom-out')) graphScale = Math.max(ZOOM_MIN, graphScale - ZOOM_STEP);
    else if (btn.classList.contains('graph-zoom-reset')) { graphScale = 1; graphPanX = 0; graphPanY = 0; applyGraphTransform(); return; }
    const ratio = graphScale / old;
    graphPanX = cx - ratio * (cx - graphPanX);
    graphPanY = cy - ratio * (cy - graphPanY);
    applyGraphTransform();
  });
}

function snapshotFingerprint(snap) {
  const nodes = snap.nodes || [];
  const eventCounts = nodes.map((n) => `${n.id}:${(snap.eventsByNode?.[n.id] || []).length}`).join(',');
  const interiorCounts = Object.entries(snap.interiorEvents || {}).map(([k, v]) => `${k}:${v.length}`).join(',');
  return `${nodes.length}|${eventCounts}|${interiorCounts}|bs${browseStack.length}`;
}

function eventRowHtml(event, isSelected, opts) {
  const o = opts || {};
  const classes = ['event-row'];
  if (isSelected) classes.push('is-selected');
  if (o.toggleId) classes.push('has-replies');
  if (o.toggleId && o.expanded) classes.push('is-expanded');
  // Outcome class drives the left-bar color: red beats green beats orange.
  if (o.status === 'declined') classes.push('has-decline');
  else if (o.status === 'accepted') classes.push('has-accept');
  const toggleAttr = o.toggleId ? ` data-toggle-intent-id="${esc(o.toggleId)}"` : '';
  const replyTag = o.toggleId
    ? ` <span class="reply-toggle" aria-hidden="true">${o.expanded ? '\u25BE' : '\u25B8'}</span>`
    : '';
  const summaryParts = [];
  if (o.toggleId) {
    const replyWord = o.summaryCount === 1 ? 'reply' : 'replies';
    summaryParts.push(`${o.summaryCount} ${replyWord}`);
    if (o.status === 'declined') summaryParts.push('<span class="meta-status is-decline">DECLINE</span>');
    else if (o.status === 'accepted') summaryParts.push(`<span class="meta-status is-accept">${esc(o.statusLabel || 'ACCEPTED')}</span>`);
    else if (o.status === 'in_progress') summaryParts.push('<span class="meta-status is-promise">PROMISED</span>');
  }
  const summary = summaryParts.length > 0 ? ` &middot; ${summaryParts.join(' &middot; ')}` : '';
  return `
    <button class="${classes.join(' ')}" data-event-id="${esc(event.id)}"${toggleAttr}>
      <span class="event-kind">${esc(event.kind.replaceAll('_', ' '))}</span>
      <span class="event-label">${esc(event.label)}${replyTag}</span>
      <span class="event-meta">${esc(event.actorId)} &middot; ${esc(timeAgo(event.timestamp))}${summary}</span>
    </button>`;
}

function eventReplyHtml(event, isSelected, hasDeeperThread) {
  const isDecline = event.raw?.type === 'DECLINE';
  const classes = ['event-reply'];
  if (isSelected) classes.push('is-selected');
  if (isDecline) classes.push('is-decline');
  if (hasDeeperThread) classes.push('has-children');
  const drillAttr = hasDeeperThread ? ` data-drill-id="${esc(event.raw?.intentId ?? '')}"` : '';
  const drillArrow = hasDeeperThread ? ' <span class="drill-arrow">&#8250;</span>' : '';
  return `
    <button class="${classes.join(' ')}" data-event-id="${esc(event.id)}"${drillAttr}>
      <span class="event-kind">${esc(event.kind.replaceAll('_', ' '))}</span>
      <span class="event-label">${esc(event.label)}${drillArrow}</span>
      <span class="event-meta">${esc(event.actorId)} &middot; ${esc(timeAgo(event.timestamp))}</span>
    </button>`;
}

function intentRepliesFor(event) {
  if (event.raw?.type !== 'INTENT') return null;
  const intentId = event.raw?.intentId;
  if (!intentId) return null;
  return snapshot?.eventsByNode?.[intentId] ?? [];
}

function computeIntentStatus(replies) {
  // Outcome semantics:
  //   declined    — any DECLINE landed (red, beats everything else)
  //   accepted    — COMPLETE landed (green, full lifecycle); ACCEPT alone also counts
  //   in_progress — only PROMISE so far (orange, awaiting accept/decline)
  //   idle        — no replies yet (no badge)
  if (!replies || replies.length === 0) return { kind: 'idle' };
  let hasDecline = false;
  let hasComplete = false;
  let hasAccept = false;
  let hasPromise = false;
  for (const r of replies) {
    const t = r.raw?.type;
    if (t === 'DECLINE') hasDecline = true;
    else if (t === 'COMPLETE') hasComplete = true;
    else if (t === 'ACCEPT') hasAccept = true;
    else if (t === 'PROMISE') hasPromise = true;
  }
  if (hasDecline) return { kind: 'declined' };
  if (hasComplete) return { kind: 'accepted', label: 'COMPLETE' };
  if (hasAccept) return { kind: 'accepted', label: 'ACCEPTED' };
  if (hasPromise) return { kind: 'in_progress' };
  return { kind: 'idle' };
}

function replyHasDeeperThread(reply) {
  if (reply.raw?.type !== 'INTENT') return false;
  const intentId = reply.raw?.intentId;
  if (!intentId) return false;
  const deeper = snapshot?.eventsByNode?.[intentId];
  return !!(deeper && deeper.length > 0);
}

function renderEventRailBody(events) {
  return events.map((event) => {
    const replies = intentRepliesFor(event);
    if (replies === null) {
      // Non-INTENT row at this level — no toggle, no replies.
      return eventRowHtml(event, event.id === selectedEventId, null);
    }
    const intentId = event.raw?.intentId;
    const expanded = !!intentId && expandedIntents.has(intentId);
    const status = computeIntentStatus(replies);
    const opts = intentId ? {
      toggleId: intentId,
      expanded,
      summaryCount: replies.length,
      status: status.kind,
      statusLabel: status.label,
    } : null;
    const rowHtml = eventRowHtml(event, event.id === selectedEventId, opts);
    if (!expanded) return rowHtml;
    if (replies.length === 0) {
      return `${rowHtml}<div class="event-replies-empty">Waiting for steward response\u2026</div>`;
    }
    const replyHtml = replies.map((reply) => {
      const deeper = replyHasDeeperThread(reply);
      return eventReplyHtml(reply, reply.id === selectedEventId, deeper);
    }).join('');
    return `${rowHtml}<div class="event-replies">${replyHtml}</div>`;
  }).join('');
}

function flattenVisibleEvents(events) {
  const out = [];
  for (const event of events) {
    out.push(event);
    const intentId = event.raw?.intentId;
    if (intentId && expandedIntents.has(intentId)) {
      const replies = intentRepliesFor(event);
      if (replies) out.push(...replies);
    }
  }
  return out;
}

function currentBrowseEvents(nodeEvents) {
  if (browseStack.length === 0) return nodeEvents;
  const deepest = browseStack[browseStack.length - 1];
  return snapshot?.interiorEvents?.[deepest.parentId] ?? [];
}

function eventHasChildren(event) {
  const intentId = event.raw?.intentId;
  if (!intentId) return false;
  const children = snapshot?.interiorEvents?.[intentId];
  return children && children.length > 0;
}

function buildBreadcrumbMarkup(selectedNode) {
  if (!selectedNode) return '';
  const nodes = snapshot.nodes || [];
  const edges = snapshot.edges || [];
  const nodeById = new Map(nodes.map((n) => [n.id, n]));
  const parentOf = new Map();
  for (const edge of edges) parentOf.set(edge.to, edge.from);

  const path = [];
  let cur = selectedNode.id;
  while (cur && nodeById.has(cur)) { path.unshift(cur); cur = parentOf.get(cur); }

  let markup = path.map((id, i) => {
    const node = nodeById.get(id);
    if (!node) return '';
    const isLast = browseStack.length === 0 && i === path.length - 1;
    const sep = i > 0 ? '<span class="crumb-sep">&#8250;</span>' : '';
    const typeLabel = node.type === 'root' ? 'space' : 'thread';
    return `${sep}<div class="crumb${isLast ? ' crumb-current' : ''}">
      <span class="crumb-type">${esc(typeLabel)}</span>
      <button class="crumb-name" data-node-id="${esc(id)}">${esc(node.title.length > 30 ? node.title.slice(0, 28) + '...' : node.title)}</button>
    </div>`;
  }).join('');

  for (let i = 0; i < browseStack.length; i++) {
    const entry = browseStack[i];
    const isLast = i === browseStack.length - 1;
    markup += `<span class="crumb-sep">&#8250;</span><div class="crumb${isLast ? ' crumb-current' : ''}">
      <span class="crumb-type">thread</span>
      <button class="crumb-name" data-browse-depth="${i}">${esc(entry.label)}</button>
    </div>`;
  }
  return markup;
}

function bindNodeClicks() {
  app.querySelectorAll('[data-node-id]').forEach((el) => {
    el.addEventListener('click', () => {
      selectedNodeId = el.getAttribute('data-node-id');
      selectedEventId = null;
      browseStack = [];
      render();
    });
  });
  app.querySelectorAll('[data-browse-depth]').forEach((el) => {
    el.addEventListener('click', () => {
      browseStack = browseStack.slice(0, parseInt(el.getAttribute('data-browse-depth'), 10) + 1);
      selectedEventId = null;
      render();
    });
  });
}

function bindEventClicks() {
  app.querySelectorAll('#event-rail .event-row[data-event-id], #event-rail .event-reply[data-event-id]').forEach((el) => {
    el.addEventListener('click', () => {
      const drillId = el.getAttribute('data-drill-id');
      if (drillId) {
        const label = el.querySelector('.event-label')?.textContent?.replace(' \u203A', '').replace(/[\u25B8\u25BE]\s*$/, '').trim() ?? drillId.slice(-8);
        browseStack.push({ parentId: drillId, label });
        selectedEventId = null;
        render();
        return;
      }
      const toggleId = el.getAttribute('data-toggle-intent-id');
      if (toggleId) {
        if (expandedIntents.has(toggleId)) expandedIntents.delete(toggleId);
        else expandedIntents.add(toggleId);
        renderedFingerprint = null; // force rail rebuild so the new replies block renders
      }
      selectedEventId = el.getAttribute('data-event-id');
      render();
    });
  });
}

function render() {
  if (!snapshot) {
    app.innerHTML = `<main class="loading-shell"><p>Scanning space...</p></main>`;
    return;
  }

  const nodes = snapshot.nodes || [];
  if (!selectedNodeId || !nodes.some((n) => n.id === selectedNodeId)) {
    selectedNodeId = nodes[0]?.id ?? null;
    browseStack = [];
  }
  const selectedNode = nodes.find((n) => n.id === selectedNodeId) ?? nodes[0];
  const nodeEvents = selectedNode ? (snapshot.eventsByNode?.[selectedNode.id] ?? []) : [];
  const visibleEvents = currentBrowseEvents(nodeEvents);
  const flatVisibleEvents = flattenVisibleEvents(visibleEvents);
  if (!selectedEventId || !flatVisibleEvents.some((e) => e.id === selectedEventId)) {
    selectedEventId = flatVisibleEvents.at(-1)?.id ?? null;
  }
  const selectedEvent = flatVisibleEvents.find((e) => e.id === selectedEventId) ?? flatVisibleEvents.at(-1) ?? null;

  const nextFp = snapshotFingerprint(snapshot);
  const browseChanged = browseStack.length !== renderedBrowseDepth;
  const nodeChanged = selectedNodeId !== renderedNodeId || browseChanged;
  const eventChanged = selectedEventId !== renderedEventId;
  const dataChanged = nextFp !== renderedFingerprint;

  if (!isFirstRender && !dataChanged && !nodeChanged && !eventChanged) return;

  // Fast path: only event selection changed
  if (!isFirstRender && !dataChanged && !nodeChanged && eventChanged) {
    app.querySelectorAll('#event-rail .event-row, #event-rail .event-reply').forEach((el) => {
      el.classList.toggle('is-selected', el.getAttribute('data-event-id') === selectedEventId);
    });
    const inspector = app.querySelector('.browser-inspector');
    if (inspector) {
      inspector.querySelector('h3').textContent = selectedEvent?.label ?? 'No event selected';
      inspector.querySelector('.inspector-meta').textContent = selectedEvent?.actorId ?? '';
      inspector.querySelector('code').textContent = JSON.stringify(selectedEvent?.raw ?? {}, null, 2);
    }
    renderedEventId = selectedEventId;
    return;
  }

  // Medium path: data changed but node didn't — rebuild event rail body
  if (!isFirstRender && dataChanged && !nodeChanged) {
    const rail = document.getElementById('event-rail');
    if (rail) {
      const subtitle = rail.querySelector('.page-subtitle');
      const subtitleHtml = subtitle ? subtitle.outerHTML : '';
      rail.innerHTML = `${subtitleHtml}${renderEventRailBody(visibleEvents)}`;
      bindEventClicks();
    }

    const navMeta = app.querySelector('.nav-meta');
    if (navMeta && selectedNode) navMeta.textContent = `${selectedNode.visibility} \u00B7 ${selectedNode.eventCount} events \u00B7 ${timeAgo(selectedNode.updatedAt)}`;

    const heroMeta = app.querySelector('.hero-meta');
    if (heroMeta) {
      const spans = heroMeta.querySelectorAll('span');
      if (spans[1]) spans[1].textContent = `${nodes.length} threads`;
      if (spans[2]) spans[2].textContent = `${Object.values(snapshot.eventsByNode || {}).reduce((s, e) => s + e.length, 0)} events`;
    }

    const graph = app.querySelector('.hero-graph');
    if (graph) {
      graph.innerHTML = buildGraphMarkup(nodes) + `<div class="graph-controls">
        <button class="graph-zoom-in" title="Zoom in">+</button>
        <button class="graph-zoom-out" title="Zoom out">&minus;</button>
        <button class="graph-zoom-reset" title="Reset view">&#8226;</button>
      </div>`;
      bindGraphPanZoom();
      graph.querySelectorAll('[data-node-id]').forEach((el) => {
        el.addEventListener('click', () => { selectedNodeId = el.getAttribute('data-node-id'); selectedEventId = null; browseStack = []; render(); });
      });
    }

    const inspector = app.querySelector('.browser-inspector');
    if (inspector) {
      inspector.querySelector('h3').textContent = selectedEvent?.label ?? 'No event selected';
      inspector.querySelector('.inspector-meta').textContent = selectedEvent?.actorId ?? '';
      inspector.querySelector('code').textContent = JSON.stringify(selectedEvent?.raw ?? {}, null, 2);
    }

    knownNodeIds = new Set(nodes.map((n) => n.id));
    renderedFingerprint = nextFp;
    renderedNodeId = selectedNodeId;
    renderedBrowseDepth = browseStack.length;
    renderedEventId = selectedEventId;
    return;
  }

  // Full render
  const totalEvents = Object.values(snapshot.eventsByNode || {}).reduce((s, e) => s + e.length, 0);
  graphPanZoomBound = false;
  app.innerHTML = `
    <main class="shell">
      <section class="hero-plane">
        <div class="hero-copy">
          <p class="eyebrow">Live space observatory</p>
          <h1>Threads appear as agents act.</h1>
          <p class="lede">
            The space anchors observation. Intent threads bloom at the edges.
            Promise lifecycles unfold inside each thread.
          </p>
          <div class="hero-meta">
            <span>${esc(snapshot.origin)}</span>
            <span>${nodes.length} threads</span>
            <span>${totalEvents} events</span>
          </div>
        </div>
        <div class="hero-graph">
          ${buildGraphMarkup(nodes)}
          <div class="graph-controls">
            <button class="graph-zoom-in" title="Zoom in">+</button>
            <button class="graph-zoom-out" title="Zoom out">&minus;</button>
            <button class="graph-zoom-reset" title="Reset view">&#8226;</button>
          </div>
        </div>
      </section>

      <section class="browser">
        <nav class="browser-nav" id="nav-bar">
          ${buildBreadcrumbMarkup(selectedNode)}
          <span class="nav-meta">${selectedNode ? `${esc(selectedNode.visibility)} \u00B7 ${selectedNode.eventCount} events \u00B7 ${esc(timeAgo(selectedNode.updatedAt))}` : ''}</span>
        </nav>

        <div class="browser-viewport">
          <div class="browser-page" id="event-rail">
            ${selectedNode ? `
              <p class="page-subtitle">${esc(selectedNode.subtitle)}${browseStack.length > 0 ? ` \u203A ${esc(browseStack[browseStack.length - 1].label)}` : ''}</p>
              ${renderEventRailBody(visibleEvents)}
            ` : '<p class="page-empty">No threads discovered yet.</p>'}
          </div>

          <aside class="browser-inspector${selectedEvent ? ' has-event' : ''}">
            <p class="eyebrow">Raw detail</p>
            <h3>${esc(selectedEvent?.label ?? 'No event selected')}</h3>
            <p class="inspector-meta">${esc(selectedEvent?.actorId ?? '')}</p>
            <pre><code>${esc(JSON.stringify(selectedEvent?.raw ?? {}, null, 2))}</code></pre>
          </aside>
        </div>
      </section>
    </main>`;

  knownNodeIds = new Set(nodes.map((n) => n.id));
  isFirstRender = false;
  renderedFingerprint = nextFp;
  renderedNodeId = selectedNodeId;
  renderedBrowseDepth = browseStack.length;
  renderedEventId = selectedEventId;

  bindNodeClicks();
  bindEventClicks();
  bindGraphPanZoom();
}

// ── Connect screen ───────────────────────────────────────────────────────────

function showConnect(errorMsg) {
  const hash = new URLSearchParams(location.hash.slice(1));
  const savedOrigin = hash.get('origin') ?? '';
  const savedSpace = hash.get('space') ?? '';
  const savedToken = hash.get('token') ?? '';

  app.innerHTML = `
    <main class="connect-shell">
      <div class="connect-card">
        <p class="eyebrow">Space observatory</p>
        <h1>Connect</h1>
        <div class="connect-error" id="connect-error">${esc(errorMsg ?? '')}</div>
        <form id="connect-form">
          <div class="connect-field">
            <label for="f-origin">Station origin</label>
            <input id="f-origin" type="url" placeholder="https://spacebase1.differ.ac" value="${esc(savedOrigin)}" required />
          </div>
          <div class="connect-field">
            <label for="f-space">Space ID</label>
            <input id="f-space" type="text" placeholder="space-xxxxxxxx-..." value="${esc(savedSpace)}" required />
          </div>
          <div class="connect-field">
            <label for="f-token">Station token</label>
            <input id="f-token" type="text" placeholder="From signup response" value="${esc(savedToken)}" required />
          </div>
          <button type="submit" class="connect-btn" id="connect-btn">Connect</button>
          <p class="connect-hint">
            These values come from the signup response. If you opened this link
            from the agent output, they are already filled in.
          </p>
        </form>
      </div>
    </main>`;

  if (errorMsg) document.getElementById('connect-error').style.display = 'block';

  document.getElementById('connect-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('connect-btn');
    const errEl = document.getElementById('connect-error');
    btn.disabled = true;
    btn.textContent = 'Connecting...';
    errEl.style.display = 'none';

    try {
      const origin = document.getElementById('f-origin').value.replace(/\/+$/, '');
      const spaceId = document.getElementById('f-space').value.trim();
      const stationToken = document.getElementById('f-token').value.trim();
      connection = { origin, stationToken, spaceId };
      location.hash = `origin=${encodeURIComponent(origin)}&space=${encodeURIComponent(spaceId)}&token=${encodeURIComponent(stationToken)}`;
      await startObservatory();
    } catch (err) {
      errEl.textContent = err.message || err.name || 'Connection failed';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Connect';
    }
  });
}

// ── Refresh loop ─────────────────────────────────────────────────────────────

const POLL_INTERVAL = 4000;
let pollTimer = null;

async function poll() {
  try {
    const { topLevel, interiors } = await scanRecursive(connection.spaceId);
    snapshot = buildSnapshot(connection.spaceId, topLevel, interiors);
    render();
  } catch (err) {
    console.warn('Poll failed:', err.message);
  }
}

async function startObservatory() {
  app.innerHTML = `<main class="loading-shell"><p>Scanning space...</p></main>`;
  const { topLevel, interiors } = await scanRecursive(connection.spaceId);
  snapshot = buildSnapshot(connection.spaceId, topLevel, interiors);
  render();
  pollTimer = setInterval(poll, POLL_INTERVAL);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
// Auto-connect if origin, space, and token are all in the hash.

async function boot() {
  const hash = new URLSearchParams(location.hash.slice(1));
  const origin = hash.get('origin');
  const space = hash.get('space');
  const token = hash.get('token');

  if (origin && space && token) {
    try {
      connection = { origin, stationToken: token, spaceId: space };
      await startObservatory();
      return;
    } catch (err) {
      showConnect(`Auto-connect failed: ${err.message || err.name || 'Unknown error'}`);
      return;
    }
  }
  showConnect();
}

boot();
    </script>
